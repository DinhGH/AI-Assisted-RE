# Docker Compose scaffold for local development.
# This file wires the services together without implementing application behavior.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    env_file:
      - ./frontend/.env.example
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      VITE_HMR_HOST: localhost
    ports:
      - "5173:5173"
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:0.5b
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ai-engine:
        condition: service_started
      ollama:
        condition: service_started

  backend-worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:0.5b
    command: ["npm", "run", "start:worker"]
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ai-engine:
        condition: service_started
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: ../docker/ai-engine.Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ai_re_analysis
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: ai_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
  ollama_data:
